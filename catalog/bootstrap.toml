schema = "dniebles.catalog"
version = 1

[[tools]]
id = "git"
description = "Version control"
os = ["linux", "darwin"]
[tools.install]
provider = "brew"
package = "git"
[tools.presence]
kind = "command_exists"
name = "git"

[[runtimes]]
id = "go"
description = "Go toolchain"
depends_on = ["tool:git"]
config_required = ["go.env"]
os = ["linux", "darwin"]
arch = ["amd64", "arm64"]
[runtimes.install]
provider = "asdf"
package = "golang"
[runtimes.presence]
kind = "command_exists"
name = "go"

[[packages]]
id = "ripgrep"
description = "Fast text search"
depends_on = ["tool:git"]
[packages.install]
provider = "brew"
package = "ripgrep"
[packages.presence]
kind = "command_exists"
name = "rg"

[[packages]]
id = "jq"
description = "JSON processor"
depends_on = ["tool:git"]
[packages.install]
provider = "brew"
package = "jq"
[packages.presence]
kind = "command_exists"
name = "jq"

[[dotfiles]]
id = "bash"
description = "Bash dotfiles"

[[bundles]]
id = "cli"
resources = ["tool:git", "package:ripgrep", "package:jq"]

[[profiles]]
id = "dev"
bundles = ["cli"]
resources = ["runtime:go"]
